name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  moonbit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Check
        run: moon check --target ${{ matrix.target }}

      - name: Run tests
        run: moon test --target ${{ matrix.target }}

      - name: Run SVG demo
        if: matrix.target == 'native'
        run: |
          moon run cmd/main
          moon run cmd/bench

      - name: Verify package
        if: matrix.target == 'native'
        run: moon package --list

      - name: Verify generated public API
        if: matrix.target == 'native'
        run: |
          moon info
          git diff --exit-code -- '*.mbti'
