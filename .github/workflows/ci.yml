name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  moonbit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Check
        run: moon check --target ${{ matrix.target }}

      # `moon fmt` and `moon info` in the current supported Moon CLI do not
      # accept `--deny-warn`. `--check` is the non-mutating formatter gate;
      # `moon info` plus a clean interface diff is the API metadata gate.
      - name: Format
        run: moon fmt --check

      - name: Run tests
        run: moon test --target ${{ matrix.target }}

      - name: Run SVG demo
        if: matrix.target == 'native'
        run: |
          moon run cmd/main
          moon run cmd/bench

      - name: Verify package
        if: matrix.target == 'native'
        run: moon package --list

      - name: Verify generated public API
        if: matrix.target == 'native'
        run: |
          moon info
          git diff --exit-code -- '*.mbti'
